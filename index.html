<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e0c0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitaab">
<title>Kitaab — Hindi Reader</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════ RESET & ROOT ═══════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }

:root {
  --bg:        #0e0c0a;
  --surface:   #171410;
  --surface2:  #201c16;
  --surface3:  #2a2520;
  --border:    #38322a;
  --accent:    #c9973c;
  --accent2:   #e0b86a;
  --accent-dim:#c9973c33;
  --text:      #ede5d8;
  --text2:     #a8997f;
  --text3:     #5c5245;
  --danger:    #c0392b;
  --safe-top:  env(safe-area-inset-top, 0px);
  --safe-bot:  env(safe-area-inset-bottom, 0px);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overscroll-behavior: none;
  touch-action: manipulation;
}

/* ═══════════════ SCREENS ═══════════════ */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s;
  will-change: transform;
  overflow: hidden;
}
.screen.hidden    { transform: translateX(100%); opacity: 0; pointer-events: none; }
.screen.slide-out { transform: translateX(100%); opacity: 0; }
.screen.active    { transform: translateX(0);    opacity: 1; }

/* ═══════════════ TOPBAR ═══════════════ */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: calc(var(--safe-top) + 14px) 18px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

.back-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  color: var(--text);
  font-size: 18px;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
  -webkit-user-select: none; user-select: none;
}
.back-btn:active { background: var(--surface3); border-color: var(--accent); }

.topbar-title {
  flex: 1;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-title .sub {
  color: var(--text3);
  font-weight: 400;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.icon-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  color: var(--text);
  font-size: 16px;
  transition: background 0.15s, border-color 0.15s;
  -webkit-user-select: none; user-select: none;
}
.icon-btn:active { background: var(--surface3); border-color: var(--accent); }

/* ═══════════════ LIBRARY SCREEN ═══════════════ */
#library-screen .topbar-title { font-size: 16px; }

.library-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px;
  padding-bottom: calc(var(--safe-bot) + 90px);
  -webkit-overflow-scrolling: touch;
}

.library-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 80px 32px;
  text-align: center;
}
.library-empty .icon { font-size: 64px; }
.library-empty h2 { font-size: 20px; font-weight: 600; color: var(--text); }
.library-empty p { font-size: 13px; color: var(--text2); font-family:'Space Mono',monospace; line-height:1.8; }

.books-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.book-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-user-select: none; user-select: none;
  position: relative;
}
.book-card:active { background: var(--surface2); border-color: var(--accent); transform: scale(0.985); }

.book-cover {
  width: 52px; height: 70px;
  background: linear-gradient(135deg, var(--surface3), var(--surface2));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  border: 1px solid var(--border);
  overflow: hidden;
}

.book-info { flex: 1; min-width: 0; }
.book-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.book-meta {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 8px;
}
.book-progress-bar {
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}
.book-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}
.book-progress-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  margin-top: 4px;
}

.book-delete {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.book-delete:active { color: var(--danger); background: rgba(192,57,43,0.1); }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(var(--safe-bot) + 24px);
  right: 20px;
  width: 60px; height: 60px;
  background: var(--accent);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(201,151,60,0.4), 0 2px 8px rgba(0,0,0,0.4);
  z-index: 20;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-user-select: none; user-select: none;
  color: #0e0c0a;
  font-weight: 700;
  line-height: 1;
}
.fab:active { transform: scale(0.9); box-shadow: 0 4px 16px rgba(201,151,60,0.3); }

/* ═══════════════ READER SCREEN ═══════════════ */
#reader-screen .topbar { background: rgba(23,20,16,0.95); backdrop-filter: blur(10px); }

.page-nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 16px;
  padding-bottom: calc(var(--safe-bot) + 10px);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.nav-btn {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  color: var(--text);
  font-size: 20px;
  transition: background 0.15s, border-color 0.15s;
  -webkit-user-select: none; user-select: none;
  flex-shrink: 0;
}
.nav-btn:active { background: var(--surface3); border-color: var(--accent); }
.nav-btn:disabled { opacity: 0.25; pointer-events: none; }

.page-slider-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.page-counter {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text2);
}

input[type=range].page-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  outline: none;
}
input[type=range].page-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(201,151,60,0.4);
}

.zoom-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.zoom-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text);
  font-size: 16px;
  -webkit-user-select: none; user-select: none;
}
.zoom-btn:active { border-color: var(--accent); }
.zoom-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  min-width: 36px;
  text-align: center;
}

/* Canvas area */
.canvas-wrap {
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background:
    radial-gradient(ellipse at 30% 60%, rgba(201,151,60,0.03) 0%, transparent 60%),
    var(--bg);
  overscroll-behavior: contain;
}

#pdf-canvas {
  display: block;
  max-width: none;
  touch-action: pan-x pan-y;
  cursor: default;
  box-shadow: 0 4px 40px rgba(0,0,0,0.6);
}

/* Loading */
.loader-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-family:'Space Mono',monospace; font-size:12px; color:var(--text3); }

/* ═══════════════ MEANING POPUP ═══════════════ */
#meaning-popup {
  position: fixed;
  z-index: 9999;
  display: none;
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  min-width: 200px;
  max-width: min(300px, 88vw);
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.85) translateY(8px); }
  to   { opacity:1; transform:scale(1)    translateY(0); }
}

.popup-bubble {
  background: #1c1710;
  border: 1.5px solid var(--accent);
  border-radius: 14px;
  padding: 14px 18px;
  box-shadow: 0 16px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,151,60,0.08);
}

.popup-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.popup-tag::after { content:''; flex:1; height:1px; background:var(--border); }

.popup-hindi {
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
}
.popup-english {
  font-family: 'Lora', serif;
  font-size: 12px;
  font-style: italic;
  color: var(--text2);
  line-height: 1.5;
}
.popup-loading {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  padding: 4px 0;
}
.mini-spin {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}

/* Arrow */
.popup-tip {
  width: 12px; height: 12px;
  background: #1c1710;
  border-right: 1.5px solid var(--accent);
  border-bottom: 1.5px solid var(--accent);
  transform: rotate(45deg);
  position: absolute;
  left: 24px;
}
.popup-tip.tip-below { bottom: -7px; }
.popup-tip.tip-above { top: -7px; transform: rotate(-135deg); }

/* ═══════════════ TOAST ═══════════════ */
#toast {
  position: fixed;
  bottom: calc(var(--safe-bot) + 90px);
  left: 50%; transform: translateX(-50%);
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 10px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text);
  z-index: 9000;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* ═══════════════ MODAL (Add Book) ═══════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-sheet {
  width: 100%;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 24px 20px calc(var(--safe-bot) + 24px);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.modal-sub {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 24px;
  line-height: 1.7;
}

.modal-drop {
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 16px;
}
.modal-drop.drag-over { border-color: var(--accent); background: var(--accent-dim); }
.modal-drop .drop-icon { font-size: 36px; margin-bottom: 10px; }
.modal-drop p { font-family:'Space Mono',monospace; font-size:12px; color:var(--text2); line-height:1.8; }
.modal-drop strong { color: var(--accent); }

.modal-btn {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  color: #0e0c0a;
  border: none;
  border-radius: 12px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.modal-btn:active { background: var(--accent2); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

#file-input { display: none; }
</style>
</head>

<!-- ░░░░░░ LIBRARY SCREEN ░░░░░░ -->
<div class="screen active" id="library-screen">
  <div class="topbar">
    <div class="topbar-title" style="font-size:17px;">📚 <span style="color:var(--accent)">Kitaab</span></div>

      <div class="icon-btn" title="About" onclick="showToast('Double-tap any word = Hindi meaning 📖')">💡</div>

<!-- ░░░░░░ MEANING POPUP ░░░░░░ -->

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ══════════ IndexedDB ══════════ */
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('KitaabDB', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books')) {
        d.createObjectStore('books', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbPut(store, obj) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

/* ══════════ State ══════════ */
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
const BASE_SCALE = 1.5;
let renderTask = null;
let currentBookId = null;
let longPressTimer = null;
let longPressWord = '';
let longPressX = 0, longPressY = 0;
let touchStartX = 0, touchStartY = 0;
let isTouching = false;

const canvas    = document.getElementById('pdf-canvas');
const ctx       = canvas.getContext('2d');
const popup     = document.getElementById('meaning-popup');
const popupWord = document.getElementById('popup-word');
const popupBody = document.getElementById('popup-body');
const popupTip  = document.getElementById('popup-tip');

/* ══════════ Screen Navigation ══════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) { s.classList.remove('hidden'); s.classList.add('active'); }
    else             { s.classList.add('hidden');    s.classList.remove('active'); }
  });
}

document.getElementById('back-btn').addEventListener('click', () => {
  hidePopup();
  if (pdfDoc && currentBookId) saveProgress();
  showScreen('library-screen');
});

/* ══════════ Toast ══════════ */
let toastTimer;
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}

/* ══════════ Library ══════════ */
async function loadLibrary() {
  const books = await dbGetAll('books');
  const grid  = document.getElementById('books-grid');
  const empty = document.getElementById('library-empty');
  grid.innerHTML = '';

  if (!books.length) { empty.style.display='flex'; return; }
  empty.style.display = 'none';

  books.sort((a,b) => b.addedAt - a.addedAt).forEach(book => {
    const pct = totalPages ? Math.round((book.lastPage || 1) / book.pages * 100) : 0;
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-cover">📖</div>
      <div class="book-info">
        <div class="book-name">${escHtml(book.name)}</div>
        <div class="book-meta">${book.pages} pages • Added ${timeAgo(book.addedAt)}</div>
        <div class="book-progress-bar">
          <div class="book-progress-fill" style="width:${Math.round((book.lastPage||1)/book.pages*100)}%"></div>
        </div>
        <div class="book-progress-label">Page ${book.lastPage||1} of ${book.pages}</div>
      </div>
      <div class="book-delete" data-id="${book.id}">🗑️</div>
    `;
    card.querySelector('.book-info').addEventListener('click', () => openBook(book.id));
    card.querySelector('.book-cover').addEventListener('click', () => openBook(book.id));
    card.querySelector('.book-delete').addEventListener('click', async e => {
      e.stopPropagation();
      if (confirm(`"${book.name}" delete karo?`)) {
        await dbDelete('books', book.id);
        showToast('Book delete ho gayi 🗑️');
        loadLibrary();
      }
    });
    grid.appendChild(card);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return 'abhi';
  if (d < 3600000) return Math.floor(d/60000) + 'm pehle';
  if (d < 86400000) return Math.floor(d/3600000) + 'h pehle';
  return Math.floor(d/86400000) + 'd pehle';
}

/* ══════════ Add Book ══════════ */
document.getElementById('add-fab').addEventListener('click', () => openModal());

function openModal() {
  document.getElementById('add-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeModal();
});

// Drag drop in modal
const modalDrop = document.getElementById('modal-drop');
modalDrop.addEventListener('dragover', e => { e.preventDefault(); modalDrop.classList.add('drag-over'); });
modalDrop.addEventListener('dragleave', () => modalDrop.classList.remove('drag-over'));
modalDrop.addEventListener('drop', e => {
  e.preventDefault();
  modalDrop.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') processPDF(f);
});
modalDrop.addEventListener('click', () => document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) processPDF(e.target.files[0]);
  e.target.value = '';
});

async function processPDF(file) {
  closeModal();
  showToast('PDF save ho raha hai... ⏳', 5000);

  const reader = new FileReader();
  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const doc  = await pdfjsLib.getDocument({ data }).promise;
    const pages = doc.numPages;

    const id = 'book_' + Date.now();
    await dbPut('books', {
      id,
      name: file.name.replace('.pdf',''),
      pages,
      data: e.target.result,  // ArrayBuffer
      lastPage: 1,
      addedAt: Date.now()
    });
    showToast('Book library mein add ho gayi! 📚');
    loadLibrary();
  };
  reader.readAsArrayBuffer(file);
}

/* ══════════ Open & Read Book ══════════ */
async function openBook(id) {
  currentBookId = id;
  showScreen('reader-screen');
  const loaderWrap = document.getElementById('reader-loader');
  loaderWrap.style.display = 'flex';
  canvas.style.display = 'none';

  const book = await dbGet('books', id);
  document.getElementById('reader-title').textContent = book.name;

  const data = new Uint8Array(book.data);
  pdfDoc = await pdfjsLib.getDocument({ data }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = book.lastPage || 1;

  const slider = document.getElementById('page-slider');
  slider.min = 1; slider.max = totalPages; slider.value = currentPage;

  loaderWrap.style.display = 'none';
  canvas.style.display = 'block';

  scale = BASE_SCALE;
  document.getElementById('zoom-label').textContent = '100%';
  renderPage(currentPage);
  showToast('⚡ Word pe double-tap karo = Hindi meaning', 3500);
}

async function renderPage(num) {
  if (renderTask) { try { renderTask.cancel(); } catch(e){} }
  currentPage = num;
  document.getElementById('page-counter').textContent = `${num} / ${totalPages}`;
  document.getElementById('page-slider').value = num;
  document.getElementById('prev-btn').disabled = num <= 1;
  document.getElementById('next-btn').disabled = num >= totalPages;

  const page = await pdfDoc.getPage(num);
  const vp   = page.getViewport({ scale });
  canvas.width  = vp.width;
  canvas.height = vp.height;

  renderTask = page.render({ canvasContext: ctx, viewport: vp });
  try { await renderTask.promise; } catch(e) {}
}

async function saveProgress() {
  const book = await dbGet('books', currentBookId);
  if (book) {
    book.lastPage = currentPage;
    await dbPut('books', book);
  }
}

document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentPage > 1) { hidePopup(); renderPage(currentPage - 1); }
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentPage < totalPages) { hidePopup(); renderPage(currentPage + 1); }
});

document.getElementById('page-slider').addEventListener('input', e => {
  renderPage(parseInt(e.target.value));
});

/* ══════════ Zoom ══════════ */
document.getElementById('zoom-in').addEventListener('click', () => {
  if (scale < 4.0) { scale = +(scale + 0.25).toFixed(2); updateZoomLabel(); renderPage(currentPage); }
});
document.getElementById('zoom-out').addEventListener('click', () => {
  if (scale > 0.5) { scale = +(scale - 0.25).toFixed(2); updateZoomLabel(); renderPage(currentPage); }
});
function updateZoomLabel() {
  document.getElementById('zoom-label').textContent = Math.round(scale / BASE_SCALE * 100) + '%';
}

/* ══════════ Word Detection ══════════ */
async function getWordAt(clientX, clientY) {
  if (!pdfDoc) return '';
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) * (canvas.width / rect.width);
  const y = (clientY - rect.top)  * (canvas.height / rect.height);

  const page = await pdfDoc.getPage(currentPage);
  const vp   = page.getViewport({ scale });
  const textContent = await page.getTextContent();

  for (const item of textContent.items) {
    const tx = pdfjsLib.Util.transform(vp.transform, item.transform);
    const ix = tx[4], iy = tx[5];
    const iw = item.width * scale;
    const ih = Math.abs(item.height) * scale || 16 * scale;

    if (x >= ix && x <= ix + iw && y >= iy - ih && y <= iy + ih * 0.3) {
      const charW = iw / (item.str.length || 1);
      const rel = x - ix;
      let ci = Math.round(rel / charW);
      ci = Math.max(0, Math.min(ci, item.str.length - 1));
      let s = ci, e = ci;
      while (s > 0 && /[\w'-]/.test(item.str[s-1])) s--;
      while (e < item.str.length-1 && /[\w'-]/.test(item.str[e+1])) e++;
      const word = item.str.substring(s, e+1).replace(/[^a-zA-Z'-]/g,'');
      if (word.length >= 2) return word;
    }
  }
  return '';
}

/* ── Mobile: Long Press ── */
canvas.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  isTouching = true;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  longPressX = touchStartX;
  longPressY = touchStartY;

  longPressTimer = setTimeout(async () => {
    if (!isTouching) return;
    const word = await getWordAt(longPressX, longPressY);
    if (word) {
      showPopupLoading(word, longPressX, longPressY);
      const meaning = await fetchHindiMeaning(word);
      showPopupResult(word, meaning);
    }
  }, 500);
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!isTouching) return;
  const dx = Math.abs(e.touches[0].clientX - touchStartX);
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dx > 8 || dy > 8) { clearTimeout(longPressTimer); }
}, { passive: true });

canvas.addEventListener('touchend', () => {
  isTouching = false;
  clearTimeout(longPressTimer);
}, { passive: true });

canvas.addEventListener('touchcancel', () => {
  isTouching = false;
  clearTimeout(longPressTimer);
}, { passive: true });

/* ── Desktop: Double Click ── */
canvas.addEventListener('dblclick', async e => {
  e.preventDefault();
  const word = await getWordAt(e.clientX, e.clientY);
  if (word) {
    showPopupLoading(word, e.clientX, e.clientY);
    const meaning = await fetchHindiMeaning(word);
    showPopupResult(word, meaning);
  }
});

/* ══════════ Fetch Meaning ══════════ */
async function fetchHindiMeaning(word) {
  try {
    const [tr, di] = await Promise.allSettled([
      fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|hi`),
      fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`)
    ]);

    let hindi = '', english = '';

    if (tr.status === 'fulfilled' && tr.value.ok) {
      const d = await tr.value.json();
      if (d.responseStatus === 200) hindi = d.responseData.translatedText;
    }
    if (di.status === 'fulfilled' && di.value.ok) {
      const d = await di.value.json();
      const def = d[0]?.meanings?.[0]?.definitions?.[0]?.definition;
      if (def) english = def;
    }
    return { hindi, english };
  } catch {
    return { hindi: 'उपलब्ध नहीं', english: '' };
  }
}

/* ══════════ Popup ══════════ */
let popX = 0, popY = 0;

function showPopupLoading(word, x, y) {
  popX = x; popY = y;
  popupWord.textContent = word;
  popupBody.innerHTML = `<div class="popup-loading"><div class="mini-spin"></div>Hindi meaning dhundh raha hun...</div>`;
  popup.style.display = 'block';
  positionPopup(x, y);
}

function showPopupResult(word, { hindi, english }) {
  popupWord.textContent = word;
  const engText = english ? english.substring(0, 100) + (english.length > 100 ? '…' : '') : '';
  popupBody.innerHTML = `
    <div class="popup-hindi">${hindi || '—'}</div>
    ${engText ? `<div class="popup-english">${engText}</div>` : ''}
  `;
  positionPopup(popX, popY);
}

function positionPopup(x, y) {
  popup.style.display = 'block';
  const vw = window.innerWidth, vh = window.innerHeight;
  const pw = popup.offsetWidth || 240;
  const ph = popup.offsetHeight || 100;
  const margin = 12;

  let left = x - 28;
  let top  = y - ph - 20;
  let tipBelow = true;

  if (top < margin) { top = y + 20; tipBelow = false; }
  if (left + pw > vw - margin) left = vw - pw - margin;
  if (left < margin) left = margin;

  popup.style.left = left + 'px';
  popup.style.top  = top  + 'px';

  const tipOff = Math.min(Math.max(x - left - 6, 10), pw - 22);
  popupTip.style.left = tipOff + 'px';
  popupTip.className  = 'popup-tip ' + (tipBelow ? 'tip-below' : 'tip-above');
}

function hidePopup() { popup.style.display = 'none'; }

document.addEventListener('touchstart', e => {
  if (popup.style.display !== 'none' && !popup.contains(e.target) && e.target !== canvas) {
    hidePopup();
  }
}, { passive: true });
document.addEventListener('click', e => {
  if (!popup.contains(e.target)) hidePopup();
});

/* ══════════ Keyboard ══════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') document.getElementById('next-btn').click();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   document.getElementById('prev-btn').click();
  if (e.key === 'Escape') hidePopup();
});

/* ══════════ History API (hardware back) ══════════ */
window.addEventListener('popstate', () => {
  const reader = document.getElementById('reader-screen');
  if (reader.classList.contains('active')) {
    if (pdfDoc && currentBookId) saveProgress();
    showScreen('library-screen');
    history.pushState(null, '', '');
  }
});

document.getElementById('back-btn').addEventListener('click', () => {
  hidePopup();
  if (pdfDoc && currentBookId) saveProgress();
  showScreen('library-screen');
  loadLibrary();
});

// Push state when entering reader so back button works
const origOpenBook = openBook;
window.openBook = async function(id) {
  history.pushState({ reader: true }, '');
  await origOpenBook(id);
};

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

openDB().then(loadLibrary);
