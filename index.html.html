<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindi Reader — PDF</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1714;
    --surface2: #242018;
    --border: #3a342a;
    --accent: #d4a853;
    --accent2: #e8c97e;
    --text: #e8e0d0;
    --text-muted: #8a8070;
    --popup-bg: #1e1a12;
    --popup-border: #d4a853;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .header-center {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }

  .page-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-info {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 80px;
    text-align: center;
  }

  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .zoom-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 38px;
    text-align: center;
  }

  .upload-btn {
    background: var(--accent);
    color: #0e0c0a;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .upload-btn:hover { background: var(--accent2); }

  .hint-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── MAIN AREA ── */
  main {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(212,168,83,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(212,168,83,0.03) 0%, transparent 50%),
      var(--bg);
  }

  /* Drop zone */
  #dropzone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    width: 560px;
    max-width: 90vw;
    padding: 80px 40px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  #dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(212,168,83,0.05);
  }
  .drop-icon { font-size: 52px; }
  .drop-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    font-family: 'Lora', serif;
  }
  .drop-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    line-height: 1.7;
  }
  .drop-cta {
    background: var(--accent);
    color: #0e0c0a;
    padding: 10px 28px;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }
  .drop-cta:hover { background: var(--accent2); }

  /* Canvas container */
  #canvas-container {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
  }

  #pdf-canvas {
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    border-radius: 4px;
    cursor: text;
    max-width: 100%;
    display: block;
  }

  /* Loading spinner */
  #loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 60px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── POPUP ── */
  #meaning-popup {
    position: fixed;
    background: var(--popup-bg);
    border: 1.5px solid var(--popup-border);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 220px;
    max-width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,168,83,0.1);
    z-index: 9999;
    display: none;
    animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .popup-word {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .popup-word::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .popup-hindi {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .popup-english {
    font-family: 'Lora', serif;
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.5;
  }

  .popup-loading {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mini-spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
    flex-shrink: 0;
  }

  .popup-arrow {
    position: absolute;
    bottom: -7px;
    left: 24px;
    width: 12px; height: 12px;
    background: var(--popup-bg);
    border-right: 1.5px solid var(--popup-border);
    border-bottom: 1.5px solid var(--popup-border);
    transform: rotate(45deg);
  }
  .popup-arrow.arrow-down {
    bottom: -7px;
    top: auto;
  }
  .popup-arrow.arrow-up {
    top: -7px;
    bottom: auto;
    border-right: none;
    border-bottom: none;
    border-left: 1.5px solid var(--popup-border);
    border-top: 1.5px solid var(--popup-border);
  }

  /* scrollbar */
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-track { background: var(--bg); }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  main::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">KITAAB<span>.read</span></div>

  <div class="header-center">
    <div class="page-nav">
      <button class="nav-btn" id="prev-btn" disabled>&#8592;</button>
      <span class="page-info" id="page-info">— / —</span>
      <button class="nav-btn" id="next-btn" disabled>&#8594;</button>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-out">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" id="zoom-in">+</button>
    </div>
  </div>

  <span class="hint-badge" id="hint-badge" style="display:none">⚡ double-click = Hindi meaning</span>

  <label for="file-input">
    <span class="upload-btn" id="upload-label">📂 Open PDF</span>
  </label>
  <input type="file" id="file-input" accept="application/pdf">
</header>

<main id="main-area">
  <div id="dropzone">
    <div class="drop-icon">📖</div>
    <div class="drop-title">Apni Book Load Karo</div>
    <div class="drop-sub">
      PDF file yahan drop karo<br>ya neeche button se select karo
    </div>
    <label for="file-input">
      <span class="drop-cta">PDF Choose Karo</span>
    </label>
    <div class="drop-sub" style="font-size:11px; margin-top:4px;">
      Koi bhi word pe <strong style="color:var(--accent)">double-click</strong> karo<br>→ Hindi meaning turant milegi
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">PDF load ho raha hai...</div>
  </div>

  <div id="canvas-container">
    <canvas id="pdf-canvas"></canvas>
  </div>
</main>

<!-- Meaning Popup -->
<div id="meaning-popup">
  <div class="popup-arrow" id="popup-arrow"></div>
  <div class="popup-word" id="popup-word">word</div>
  <div id="popup-body">
    <div class="popup-loading">
      <div class="mini-spinner"></div>
      <span>Searching...</span>
    </div>
  </div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ──
  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 0;
  let scale = 1.4;
  let renderTask = null;

  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const popup = document.getElementById('meaning-popup');
  const popupWord = document.getElementById('popup-word');
  const popupBody = document.getElementById('popup-body');
  const popupArrow = document.getElementById('popup-arrow');
  const pageInfo = document.getElementById('page-info');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const dropzone = document.getElementById('dropzone');
  const loading = document.getElementById('loading');
  const canvasContainer = document.getElementById('canvas-container');
  const hintBadge = document.getElementById('hint-badge');
  const zoomLabel = document.getElementById('zoom-label');

  // ── File Load ──
  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) loadPDF(e.target.files[0]);
  });

  // Drag & Drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadPDF(f);
  });

  function loadPDF(file) {
    dropzone.style.display = 'none';
    loading.style.display = 'flex';
    const reader = new FileReader();
    reader.onload = async (e) => {
      const typedarray = new Uint8Array(e.target.result);
      pdfDoc = await pdfjsLib.getDocument({ data: typedarray }).promise;
      totalPages = pdfDoc.numPages;
      currentPage = 1;
      loading.style.display = 'none';
      canvasContainer.style.display = 'flex';
      hintBadge.style.display = 'inline-flex';
      prevBtn.disabled = false;
      nextBtn.disabled = false;
      renderPage(currentPage);
    };
    reader.readAsArrayBuffer(file);
  }

  async function renderPage(num) {
    if (renderTask) { renderTask.cancel(); }
    pageInfo.textContent = `${num} / ${totalPages}`;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= totalPages;

    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    renderTask = page.render({ canvasContext: ctx, viewport });
    try { await renderTask.promise; } catch(e) { /* cancelled */ }
  }

  prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(currentPage); hidePopup(); } });
  nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(currentPage); hidePopup(); } });

  // Zoom
  document.getElementById('zoom-in').addEventListener('click', () => {
    if (scale < 3.0) { scale = Math.round((scale + 0.2) * 10) / 10; zoomLabel.textContent = Math.round(scale * 100 / 1.4 * 100) + '%'; renderPage(currentPage); }
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    if (scale > 0.6) { scale = Math.round((scale - 0.2) * 10) / 10; zoomLabel.textContent = Math.round(scale * 100 / 1.4 * 100) + '%'; renderPage(currentPage); }
  });

  // ── Double Click → Meaning ──
  canvas.addEventListener('dblclick', async (e) => {
    if (!pdfDoc) return;

    // Get clicked position on canvas
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);

    // Get text from PDF page at this position
    const page = await pdfDoc.getPage(currentPage);
    const viewport = page.getViewport({ scale });
    const textContent = await page.getTextContent();

    let clickedWord = '';

    // Find which text item was clicked
    for (const item of textContent.items) {
      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const itemX = tx[4];
      const itemY = tx[5];
      const itemW = item.width * scale;
      const itemH = item.height * scale;

      if (x >= itemX && x <= itemX + itemW &&
          y >= itemY - itemH && y <= itemY) {
        // Found the text item, now find the specific word
        const words = item.str.split(/\s+/);
        const charWidth = itemW / (item.str.length || 1);
        const relX = x - itemX;
        let charIdx = Math.floor(relX / charWidth);
        charIdx = Math.max(0, Math.min(charIdx, item.str.length - 1));

        // Walk backward and forward to get full word
        let start = charIdx, end = charIdx;
        while (start > 0 && /\w/.test(item.str[start - 1])) start--;
        while (end < item.str.length - 1 && /\w/.test(item.str[end + 1])) end++;

        clickedWord = item.str.substring(start, end + 1).replace(/[^a-zA-Z'-]/g, '');
        break;
      }
    }

    // Fallback: try window selection
    if (!clickedWord) {
      clickedWord = window.getSelection?.()?.toString?.().trim() || '';
    }

    if (!clickedWord || clickedWord.length < 2) return;

    showPopupLoading(clickedWord, e.clientX, e.clientY);
    const meaning = await fetchHindiMeaning(clickedWord);
    showPopupResult(clickedWord, meaning);
  });

  // ── API Call ──
  async function fetchHindiMeaning(word) {
    try {
      // First try dictionary for English definition
      const [transRes, dictRes] = await Promise.allSettled([
        fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|hi`),
        fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`)
      ]);

      let hindi = '';
      let english = '';

      if (transRes.status === 'fulfilled') {
        const data = await transRes.value.json();
        if (data.responseStatus === 200) {
          hindi = data.responseData.translatedText;
        }
      }

      if (dictRes.status === 'fulfilled' && dictRes.value.ok) {
        const data = await dictRes.value.json();
        const def = data[0]?.meanings?.[0]?.definitions?.[0]?.definition;
        if (def) english = def;
      }

      return { hindi, english };
    } catch {
      return { hindi: 'उपलब्ध नहीं', english: '' };
    }
  }

  // ── Popup ──
  let popupX = 0, popupY = 0;

  function showPopupLoading(word, x, y) {
    popupX = x; popupY = y;
    popupWord.textContent = word;
    popupBody.innerHTML = `<div class="popup-loading"><div class="mini-spinner"></div><span>Hindi meaning dhundh raha hun...</span></div>`;
    popup.style.display = 'block';
    positionPopup(x, y);
  }

  function showPopupResult(word, { hindi, english }) {
    popupWord.textContent = word;
    popupBody.innerHTML = `
      <div class="popup-hindi">${hindi || '—'}</div>
      ${english ? `<div class="popup-english">${english.length > 90 ? english.substring(0,90)+'…' : english}</div>` : ''}
    `;
    positionPopup(popupX, popupY);
  }

  function positionPopup(x, y) {
    popup.style.display = 'block';
    const pw = popup.offsetWidth || 260;
    const ph = popup.offsetHeight || 100;
    const margin = 12;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    let left = x - 24;
    let top = y - ph - 16;
    let arrowUp = false;

    if (top < margin) { top = y + 20; arrowUp = true; }
    if (left + pw > vw - margin) left = vw - pw - margin;
    if (left < margin) left = margin;

    popup.style.left = left + 'px';
    popup.style.top = top + 'px';

    // Arrow
    const arrowOffset = Math.min(Math.max(x - left - 6, 12), pw - 24);
    popupArrow.style.left = arrowOffset + 'px';
    if (arrowUp) {
      popupArrow.className = 'popup-arrow arrow-up';
    } else {
      popupArrow.className = 'popup-arrow arrow-down';
    }
  }

  function hidePopup() {
    popup.style.display = 'none';
  }

  document.addEventListener('click', (e) => {
    if (!popup.contains(e.target)) hidePopup();
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextBtn.click();
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevBtn.click();
    if (e.key === 'Escape') hidePopup();
  });
</script>
</body>
</html>
